version: "3.9"
# ══════════════════════════════════════════════════
# Server Licenze — Deploy separato su VPS
# Esegui questo su un server remoto (Hetzner, DigitalOcean, ecc.)
# NON necessario per il funzionamento locale (LICENSE_KEY=TEST-MODE)
# ══════════════════════════════════════════════════
services:
  license-server:
    build: .
    container_name: ai-bandi-license-server
    restart: unless-stopped
    environment:
      - ADMIN_SECRET=${ADMIN_SECRET:-cambia-questa-password-in-produzione}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/"]
      interval: 60s
      timeout: 10s
      retries: 3
