services:
  - type: web
    name: baia-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: frankfurt
    healthCheckPath: /
    envVars:
      # Supabase PostgreSQL
      - key: DATABASE_URL
        sync: false
      # Anthropic AI
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: anthropic
      - key: AI_MODEL
        value: claude-haiku-4-5-20251001
      # App config
      - key: APP_NAME
        value: BA.IA
      - key: LICENSE_KEY
        value: TEST-MODE
      # CORS
      - key: ALLOWED_ORIGINS
        sync: false
      - key: APP_URL
        sync: false
      # SMTP
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      # Python
      - key: PYTHONUTF8
        value: "1"
