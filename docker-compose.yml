version: "3.9"

services:
  backend:
    build: ./backend
    container_name: ai-bandi-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      - LICENSE_KEY=${LICENSE_KEY:-TEST-MODE}
      - LICENSE_SERVER=${LICENSE_SERVER:-https://licenses.tuodominio.it}
      - APP_NAME=${APP_NAME:-AI Analisi Bandi}
      - DB_PATH=/data/ai-bandi.db
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@ai-bandi.it}
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./data:/data          # Dati persistenti nella cartella locale
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - ai-bandi-net

  frontend:
    image: nginx:alpine
    container_name: ai-bandi-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai-bandi-net

networks:
  ai-bandi-net:
    name: ai-bandi-net
